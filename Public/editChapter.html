<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Chapter</title>
    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="css/editChapter.css">

</head>


<body>


<header class="navbar">

    <h2>
        📖 Secret Diary
    </h2>


    <a href="dashboard.html">
        ← Dashboard
    </a>

</header>





<main class="container">


    <h1>
        Edit Chapter
    </h1>




    <input 
    id="title"
    type="text"
    placeholder="Chapter title"
    >




    <textarea 
    id="content"
    placeholder="Write your diary..."
    ></textarea>





    <div class="favorite-box">


        <input 
        type="checkbox"
        id="favourite"
        >


        <label for="favourite">
            ❤️ Favourite Chapter
        </label>


    </div>





    <button id="saveBtn">

        Save Changes

    </button>



</main>





<script src="js/editChapter.js"></script>


</body>

</html>
